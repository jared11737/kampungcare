name: kampung_care
description: AI-powered elderly care network for Malaysia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  fl_chart: ^0.70.2
  shimmer: ^3.0.0

  # Camera
  camera: ^0.11.1
  image_picker: ^1.1.2

  # Voice (works offline — uses device built-in STT/TTS)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  wakelock_plus: ^1.3.1

  # Local notifications (works without FCM)
  flutter_local_notifications: ^18.0.1

  # Biometric (works offline)
  local_auth: ^2.3.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # AI + Location (production services)
  google_generative_ai: ^0.4.6
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
